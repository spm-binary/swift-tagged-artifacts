name: Build release

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: Upstream swift-tagged ref to build
        required: true
        default: "0.10.0"
      release_tag:
        description: Release tag for generated artifacts
        required: true
        default: "0.10.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout builder
        uses: actions/checkout@v6

      - name: Select latest Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build XCFrameworks
        run: Scripts/build-xcframeworks.sh "${{ inputs.upstream_ref }}" "${{ inputs.release_tag }}"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/*.zip dist/checksums.txt --clobber
          else
            gh release create "$RELEASE_TAG" dist/*.zip dist/checksums.txt \
              --title "$RELEASE_TAG" \
              --notes "XCFramework artifacts for swift-tagged ${RELEASE_TAG}."
          fi
